<!-- public/provider.html -->
<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Advising Calendar</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>


 <h1>Create an advising appointment</h1>

 <div id="message"></div>

 <section id="createSlotPanel">
    

    <label>Start time</label>
       <input id="startTimeInput" type="datetime-local">
    

    <label>End time</label>
        <input id="endTimeInput" type="datetime-local">
    
    <label>Status</label>
    <select id="myStatus" name="myStatus" type="text">
            <option value="Available">Available</option>
            <option value="Booked">Booked</option>
    </select>
    <label>Student name</label>
        <input id="myName" type="text" placeholder="your name">

    <button id="createSlotButton">Create Slot</button>
 </section>

 <section>
    
    <!-- Calendar month title-->
<div class="calendar-header">

  <div class="calendar-nav">
    <button id="prevMonth">◀</button>
    <h2 id="monthTitle"></h2>
    <button id="nextMonth">▶</button>
  </div>

</div>


    <div id="calendarGrid"></div>
 </section>

<!-- Appointment Modal -->
<div id="appointmentModal" class="modal">
  <div class="modal-content">
    <span id="modalClose" class="close">&times;</span>
    <h2>Appointment Details</h2>
    <p><strong>Start:</strong> <span id="modalStartTime"></span></p>
    <p><strong>End:</strong> <span id="modalEndTime"></span></p>
    <p><strong>Status:</strong> <span id="modalStatus"></span></p>
    <p><strong>Name:</strong> <span id="modalName"></span></p>

<label>Start</label>
<input type="datetime-local" id="rescheduleStart">

<label>End</label>
<input type="datetime-local" id="rescheduleEnd">


     <!-- Delete button -->
    <button id="modalDeleteButton" class="delete-btn">Delete Appointment</button>
    <button id="modalRescheduleButton" class="submitBtn">Reschedule</button>
  </div>
</div>

<!-- Reschedule Modal -->
<div id="rescheduleModal" class="modal">
  <div class="modal-content">
    <span id="modalClose" class="close">&times;</span>
    <h2>Reschedule your appointment</h2>
    <p><strong>Start:</strong> <span id="modalStartTime"></span></p>
    <p><strong>End:</strong> <span id="modalEndTime"></span></p>
    <p><strong>Status:</strong> <span id="modalStatus"></span></p>
    <p><strong>Name:</strong> <span id="modalName"></span></p>
     <!-- Cancel button -->
    <button id="modalCancelButton" class="cancel-btn">Cancel</button>
    <button id="modalRescheduleButton" class="submitBtn">Reschedule</button>
  </div>
</div>


    <!-- Script runs after the DOM exists -->
    <script src="provider.js"></script>
    

</body>



</html>
